<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jewellery Categories</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Poppins',sans-serif;

    display:flex;
    justify-content:center;

    align-items:flex-start; /* Start from top */

    overflow-x:hidden;      /* Hide only horizontal scroll */
    overflow-y:auto;        /* Enable vertical scrolling */

    background:#faf7ff;
    position:relative;

    padding:40px 0;         /* Top and bottom spacing */
}

/* Premium Animated Background */

.bg{
    position:fixed;
    inset:-20%;
    z-index:-2;
}

.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(100px);
    animation:move 18s infinite alternate ease-in-out;
}

.blob:nth-child(1){
    width:550px;
    height:550px;
    background:#c084fc;
    top:5%;
    left:5%;
}

.blob:nth-child(2){
    width:500px;
    height:500px;
    background:#fde68a;
    right:10%;
    top:0;
    animation-delay:3s;
}

.blob:nth-child(3){
    width:650px;
    height:650px;
    background:#9333ea;
    bottom:-15%;
    left:30%;
    animation-delay:5s;
}

@keyframes move{
    from{
        transform:translate(0,0) scale(1);
    }
    to{
        transform:translate(100px,-80px) scale(1.25);
    }
}

/* Container */

.container{
    width:95%;
    max-width:1400px;

    background:rgba(255,255,255,.20);

    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    border:1px solid rgba(255,255,255,.35);

    border-radius:35px;

    padding:45px;

    margin:30px 0; /* Add this */

    box-shadow:
    0 20px 70px rgba(124,58,237,.15),
    0 0 40px rgba(212,175,55,.15);

    animation:entry .8s ease;
}

@keyframes entry{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Heading */

h1{

    text-align:center;

    font-family:'Cinzel',serif;

    font-size:3rem;

    background:linear-gradient(
        90deg,
        #d4af37,
        #fff3b0,
        #d4af37
    );

    background-size:300%;

    background-clip:text;
    -webkit-background-clip:text;

    color:transparent;
    -webkit-text-fill-color:transparent;

    animation:shine 5s linear infinite;

    margin-bottom:12px;
}

.subtitle{

    text-align:center;

    color:#5b21b6;

    margin-bottom:40px;

    font-size:1rem;
}

@keyframes shine{
    from{
        background-position:0%;
    }
    to{
        background-position:300%;
    }
}

/* Cards */

.cards{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:28px;
}

.card{

    position:relative;

    background:rgba(255,255,255,.45);

    border:1px solid rgba(255,255,255,.4);

    border-radius:28px;

    overflow:hidden;

    cursor:pointer;

    transition:.45s ease;

    box-shadow:
    0 10px 30px rgba(0,0,0,.05);
}

.card::before{

    content:'';

    position:absolute;

    inset:0;

    background:
    linear-gradient(
    135deg,
    rgba(212,175,55,.15),
    rgba(147,51,234,.08));

    opacity:0;

    transition:.45s;
}

.card:hover{

    transform:
    translateY(-12px)
    scale(1.03);

    box-shadow:
    0 25px 45px rgba(124,58,237,.15),
    0 0 30px rgba(212,175,55,.25);
}

.card:hover::before{
    opacity:1;
}

/* Full Card Image */

.image-box{

    width:100%;
    height:280px;

    overflow:hidden;
}

.image-box img{

    width:100%;
    height:100%;

    object-fit:cover;

    transition:.7s ease;
}

.card:hover img{

    transform:scale(1.12);
}

/* Content */

.content{

    padding:22px;
    text-align:center;
}

.content h3{

    color:#4c1d95;

    font-size:1.35rem;

    margin-bottom:8px;

    position:relative;
    z-index:2;
}

.content p{

    color:#666;

    font-size:.92rem;

    position:relative;
    z-index:2;
}

/* Mobile */

@media(max-width:768px){

    .container{
        padding:25px;
    }

    h1{
        font-size:2.2rem;
    }

    .image-box{
        height:220px;
    }

}

</style>

</head>
<body>

<div class="bg">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
</div>

<div class="container">


<h1>Select Jewellery Category</h1>

<p class="subtitle">
    Choose your jewellery type to continue
</p>

<div class="cards">

    <!-- Necklace -->

    <div class="card" onclick="location.href='/gold/necklaces'">

        <div class="image-box">
            <img src="images/neck3.jpg" alt="Necklace">
        </div>

        <div class="content">
            <h3>Necklace</h3>
            <p>Elegant Gold Necklace Collection</p>
        </div>

    </div>

    <!-- Ring -->

    <div class="card" onclick="location.href='/gold/rings'">

        <div class="image-box">
            <img src="images/ring.jpg" alt="Ring">
        </div>

        <div class="content">
            <h3>Ring</h3>
            <p>Premium Gold Ring Designs</p>
        </div>

    </div>

    <!-- Bangles -->

    <div class="card" onclick="location.href='/gold/bangles'">

        <div class="image-box">
            <img src="images/bangles.jpg" alt="Bangles">
        </div>

        <div class="content">
            <h3>Bangles</h3>
            <p>Traditional & Modern Bangles</p>
        </div>

    </div>

    <!-- Earrings -->

    <div class="card" onclick="location.href='/gold/earrings'">

        <div class="image-box">
            <img src="images/earrings.jpg" alt="Earrings">
        </div>

        <div class="content">
            <h3>Earrings</h3>
            <p>Beautiful Gold Earrings</p>
        </div>

    </div>

    <!-- Anklets -->

    <div class="card" onclick="location.href='/gold/anklets'">

        <div class="image-box">
            <img src="images/anklets.jpg" alt="Anklets">
        </div>

        <div class="content">
            <h3>Anklets</h3>
            <p>Exclusive Gold Anklet Designs</p>
        </div>

    </div>

</div>

</div>

<script>

function openCategory(category){

    window.location.href =
    "gold-calculator.html?category=" + category;

}

</script>

</body>
</html>
